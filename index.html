<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUARE - Sleek Premium Expense Tracker</title>
    <!-- Tailwind CSS for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#121214',
                        darkCard: '#1C1C1E',
                        darkAccent: '#2C2C2E',
                        brandGreen: '#55EF9E',
                        brandPink: '#FF7E82',
                        brandBlue: '#3CC4EC',
                        brandPurple: '#8E8FFA',
                        brandYellow: '#FCD34D',
                        brandOrange: '#FF9F43'
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -10px rgba(0,0,0,0.7)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Sleek premium typography matching the design mock */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121214;
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom scrollbar for horizontal month scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Ring segment transitions */
        .chart-segment {
            transition: stroke-dasharray 0.5s ease, stroke-dashoffset 0.5s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-0 sm:p-4">

    <!-- INITIAL HANDSHAKE LOADING -->
    <div id="loading-screen" class="fixed inset-0 bg-darkBg z-50 flex flex-col items-center justify-center gap-4">
        <div class="animate-spin w-12 h-12 border-4 border-brandGreen border-t-transparent rounded-full"></div>
        <p class="text-xs font-semibold text-zinc-400 uppercase tracking-widest mt-2">Securing Cloud Handshake...</p>
    </div>

    <!-- AUTHENTICATION LAYER -->
    <div id="login-screen" class="hidden w-full max-w-md bg-darkCard p-8 rounded-3xl shadow-premium border border-zinc-800 flex flex-col gap-6 mx-4">
        <div class="text-center">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">SQUARE_SECURE</h1>
            <p class="text-xs font-medium text-zinc-400 mt-1">Unlock Your Real-Time Balance Database</p>
        </div>

        <div class="flex bg-darkBg p-1 rounded-xl border border-zinc-800">
            <button id="tab-login" onclick="switchAuthTab('login')" class="flex-1 py-2.5 text-center text-xs font-bold uppercase tracking-wider rounded-lg bg-zinc-800 text-white transition-all">
                Sign In
            </button>
            <button id="tab-register" onclick="switchAuthTab('register')" class="flex-1 py-2.5 text-center text-xs font-bold uppercase tracking-wider rounded-lg text-zinc-400 transition-all">
                Register
            </button>
        </div>

        <form id="auth-form" onsubmit="handleAuthSubmit(event)" class="flex flex-col gap-4">
            <div>
                <label for="auth-username" class="block text-xs font-bold uppercase mb-2 text-zinc-400">Username</label>
                <input type="text" id="auth-username" placeholder="Type username" required
                       class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:border-brandGreen focus:outline-none text-sm placeholder-zinc-600">
            </div>

            <div>
                <label for="auth-password" class="block text-xs font-bold uppercase mb-2 text-zinc-400">Password</label>
                <input type="password" id="auth-password" placeholder="••••••••" required
                       class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:border-brandGreen focus:outline-none text-sm placeholder-zinc-600">
            </div>

            <div id="db-status-badge" class="bg-zinc-900/50 p-3 rounded-xl border border-zinc-800 text-[11px] font-bold uppercase text-zinc-400 tracking-wider text-center transition-all">
                Scanning Cloud Connection...
            </div>

            <button type="submit" id="auth-btn" class="w-full bg-brandGreen hover:bg-emerald-400 text-darkBg font-extrabold py-4 rounded-xl transition-all shadow-lg shadow-brandGreen/20 text-sm uppercase tracking-wider mt-2">
                Access Workspace
            </button>
        </form>
    </div>

    <!-- MAIN MOBILE CONTAINER APP FRAME -->
    <div id="app-screen" class="hidden w-full max-w-md bg-darkBg sm:rounded-[40px] shadow-premium sm:border-[8px] border-zinc-800 flex flex-col overflow-hidden min-h-screen sm:min-h-[850px] relative">
        
        <!-- TOP APP HEADER -->
        <header class="p-6 pb-2 flex justify-between items-center bg-darkBg">
            <div>
                <p class="text-xs text-zinc-400 font-medium">Hello,</p>
                <h2 id="user-display" class="text-lg font-bold text-white">John Doe</h2>
            </div>
            <div class="flex items-center gap-3">
                <span id="workspace-mode-label" class="bg-zinc-800 text-zinc-300 px-2.5 py-1 rounded-full font-bold text-[10px] tracking-wide uppercase">LOCAL</span>
                <button onclick="handleLogout()" class="p-2 bg-zinc-800/60 hover:bg-zinc-800 rounded-full transition-colors text-zinc-400 hover:text-white" title="Lock workspace">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12.22 2h-.44a2 2 0 00-2 2v2h4.44V4a2 2 0 00-2-2zM6.5 10.5V8a5.5 5.5 0 0111 0v2.5M4 11h16a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2v-7a2 2 0 012-2z" /></svg>
                </button>
            </div>
        </header>

        <!-- HORIZONTAL MONTH TABS (January to December Filter) -->
        <div class="px-6 py-2 overflow-x-auto flex gap-4 no-scrollbar border-b border-zinc-900 bg-darkBg">
            <button onclick="filterByMonth(0)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">January</button>
            <button onclick="filterByMonth(1)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">February</button>
            <button onclick="filterByMonth(2)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">March</button>
            <button onclick="filterByMonth(3)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">April</button>
            <button onclick="filterByMonth(4)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">May</button>
            <button onclick="filterByMonth(5)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">June</button>
            <button onclick="filterByMonth(6)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">July</button>
            <button onclick="filterByMonth(7)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">August</button>
            <button onclick="filterByMonth(8)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">September</button>
            <button onclick="filterByMonth(9)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">October</button>
            <button onclick="filterByMonth(10)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">November</button>
            <button onclick="filterByMonth(11)" class="month-tab shrink-0 text-sm font-semibold pb-2 border-b-2 border-transparent transition-all text-zinc-500 hover:text-white">December</button>
        </div>

        <!-- CORE STATS BALANCE VIEW -->
        <div class="px-6 pt-5 grid grid-cols-2 gap-4">
            <!-- Total Balance (Salary) -->
            <div class="bg-darkCard p-4 rounded-2xl border border-zinc-800 relative group overflow-hidden">
                <span class="text-[11px] font-semibold text-zinc-400 block mb-1 uppercase tracking-wide">Total Balance</span>
                <span id="salary-display" class="text-xl font-bold text-white block">₹0</span>
                <button onclick="openSalaryModal()" class="absolute right-3 bottom-3 p-1.5 bg-zinc-800 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                </button>
            </div>
            
            <!-- Total Expense -->
            <div class="bg-darkCard p-4 rounded-2xl border border-zinc-800">
                <span class="text-[11px] font-semibold text-zinc-400 block mb-1 uppercase tracking-wide">Total Expense</span>
                <span id="total-expense-display" class="text-xl font-bold text-white block">₹0</span>
            </div>
        </div>

        <!-- CIRCULAR DOUGHNUT CHART CARD -->
        <div class="mx-6 mt-5 bg-darkCard p-6 rounded-3xl border border-zinc-800 flex flex-col items-center justify-center min-h-[260px]">
            <div class="relative w-44 h-44 flex items-center justify-center">
                <!-- SVG Container for the custom dynamic arcs -->
                <svg id="doughnut-chart-svg" class="w-full h-full transform -rotate-90" viewBox="0 0 120 120">
                    <!-- Standard placeholder base ring circle -->
                    <circle cx="60" cy="60" r="46" fill="none" stroke="#2C2C2E" stroke-width="12" />
                </svg>

                <!-- Center metrics block -->
                <div class="absolute flex flex-col items-center justify-center text-center">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-zinc-400">Expense</span>
                    <span id="center-total-display" class="text-xl font-extrabold text-white">₹0</span>
                </div>
            </div>

            <!-- Distribution percentages status indicator -->
            <div id="chart-legend-list" class="grid grid-cols-3 gap-y-2.5 gap-x-1.5 w-full mt-6 border-t border-zinc-800/60 pt-4 text-[11px] font-bold tracking-wide uppercase text-zinc-400">
                <!-- Dynamic categories inject dynamically here -->
            </div>
        </div>

        <!-- HISTORY LEDGERS SECTION -->
        <div class="px-6 pt-5 pb-24 flex-grow flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-extrabold uppercase tracking-widest text-zinc-400">Recent Ledgers</h3>
                <span id="filtered-count" class="text-[11px] font-semibold text-zinc-500 uppercase">0 Entries</span>
            </div>

            <div class="flex-grow min-h-[150px] overflow-y-auto space-y-3 pr-0.5" id="ledger-list">
                <!-- Ledger Cards will populate dynamically -->
                <div class="text-center py-8 text-zinc-500 text-xs font-semibold uppercase tracking-wider">No logs listed.</div>
            </div>
        </div>

        <!-- FLOATING ADD BUTTON & CONTROL NAVIGATION PANEL -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center bg-darkCard/95 backdrop-blur-md py-3 px-6 rounded-2xl border border-zinc-800 gap-6 shadow-2xl z-20">
            <button onclick="downloadCSV()" class="p-2 text-zinc-400 hover:text-white transition-colors" title="Export CSV file">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            </button>
            
            <button onclick="openAddExpenseSheet()" class="w-12 h-12 rounded-full bg-brandGreen text-darkBg hover:scale-105 active:scale-95 transition-all flex items-center justify-center shadow-lg shadow-brandGreen/25" title="Add entry">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            </button>

            <button onclick="clearAllExpenses()" class="p-2 text-zinc-400 hover:text-brandPink transition-colors" title="Clear Workspace">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
        </div>

    </div>

    <!-- SLIDE-IN BOTTOM MODAL SHEET: ADD TRANSACTION -->
    <div id="add-expense-sheet" class="fixed inset-0 bg-black/80 flex items-end justify-center z-40 hidden transition-opacity duration-300">
        <div class="w-full max-w-md bg-darkCard rounded-t-[32px] p-6 border-t border-zinc-800 flex flex-col gap-5 transform translate-y-full transition-transform duration-300">
            <!-- Header bar -->
            <div class="flex justify-between items-center pb-2 border-b border-zinc-800/60">
                <h3 class="text-base font-bold text-white uppercase tracking-wider">New Transaction</h3>
                <button onclick="closeAddExpenseSheet()" class="p-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 hover:text-white rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <!-- Form -->
            <form id="expense-form" onsubmit="handleExpenseSubmit(event)" class="flex flex-col gap-4">
                <div>
                    <label for="item-title" class="block text-xs font-bold uppercase mb-2 text-zinc-400">Description</label>
                    <input type="text" id="item-title" placeholder="e.g. Uber Cab Charge" required
                           class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:border-brandGreen focus:outline-none text-sm placeholder-zinc-700">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="item-amount" class="block text-xs font-bold uppercase mb-2 text-zinc-400">Amount (₹)</label>
                        <input type="number" id="item-amount" min="1" step="1" placeholder="₹0" required
                               class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:border-brandGreen focus:outline-none text-sm placeholder-zinc-700">
                    </div>
                    <div>
                        <label for="item-date" class="block text-xs font-bold uppercase mb-2 text-zinc-400">Date</label>
                        <input type="date" id="item-date" required
                               class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:border-brandGreen focus:outline-none text-xs placeholder-zinc-700">
                    </div>
                </div>

                <!-- SELECT CATEGORY PILLS PANEL (Mirrors right design layout) -->
                <div>
                    <span class="block text-xs font-bold uppercase mb-2.5 text-zinc-400">Select Category</span>
                    <input type="hidden" id="item-category" value="Food & Dining">
                    <div id="category-pills-container" class="flex flex-wrap gap-2">
                        <button type="button" onclick="selectCategoryPill('Food & Dining')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Food</button>
                        <button type="button" onclick="selectCategoryPill('Transport & Auto')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Transport</button>
                        <button type="button" onclick="selectCategoryPill('Entertainment')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Entertainment</button>
                        <button type="button" onclick="selectCategoryPill('Utilities & Bills')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Utilities</button>
                        <button type="button" onclick="selectCategoryPill('Shopping & Custom')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Shopping</button>
                        <button type="button" onclick="selectCategoryPill('Miscellaneous')" class="cat-pill px-3 py-1.5 rounded-lg text-xs font-semibold bg-zinc-800 text-zinc-400 transition-colors uppercase border border-transparent">Misc</button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-brandGreen hover:bg-emerald-400 text-darkBg font-extrabold py-3.5 rounded-xl transition-all shadow-lg shadow-brandGreen/20 text-sm uppercase tracking-wider mt-2">
                    Add Expense
                </button>
            </form>
        </div>
    </div>

    <!-- UPDATE SALARY MODAL -->
    <div id="salary-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-darkCard p-6 rounded-3xl border border-zinc-800 max-w-sm w-full shadow-premium">
            <h3 class="text-base font-bold uppercase text-white border-b border-zinc-800/60 pb-3 mb-4">Set Monthly Income</h3>
            <div class="flex flex-col gap-4">
                <div>
                    <label for="new-salary-input" class="block text-xs font-bold uppercase text-zinc-400 mb-2">Total Salary (₹)</label>
                    <input type="number" id="new-salary-input" min="1" placeholder="₹50000" class="w-full bg-darkBg text-white rounded-xl p-3.5 border border-zinc-800 focus:outline-none text-sm placeholder-zinc-700">
                </div>
                <div class="flex justify-end gap-2 mt-2">
                    <button onclick="closeSalaryModal()" class="bg-zinc-800 text-zinc-400 hover:text-white font-semibold py-2.5 px-4 rounded-xl text-xs uppercase">Cancel</button>
                    <button onclick="saveSalary()" class="bg-brandGreen text-darkBg font-bold py-2.5 px-4 rounded-xl text-xs uppercase">Save Income</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CUSTOM CONFIRM DIALOG MODAL -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-darkCard p-6 rounded-3xl border border-zinc-800 max-w-sm w-full shadow-premium">
            <h3 class="text-base font-bold uppercase text-brandPink border-b border-zinc-800/60 pb-3 mb-2">Attention</h3>
            <p id="confirm-message" class="text-xs text-zinc-400 uppercase font-medium mb-6 leading-relaxed"></p>
            <div class="flex justify-end gap-2">
                <button id="confirm-cancel" class="bg-zinc-800 text-zinc-400 hover:text-white font-semibold py-2.5 px-4 rounded-xl text-xs uppercase">Cancel</button>
                <button id="confirm-ok" class="bg-brandPink text-white font-bold py-2.5 px-4 rounded-xl text-xs uppercase">Proceed</button>
            </div>
        </div>
    </div>

    <!-- TOAST POPUP NOTIFICATION -->
    <div id="toast-notification" class="fixed bottom-4 right-4 bg-darkCard text-white p-4 rounded-2xl border border-zinc-800 shadow-premium hidden z-50 transition-all duration-300">
        <div class="flex items-center gap-3">
            <div id="toast-indicator" class="w-3 h-3 rounded-full bg-brandGreen"></div>
            <p id="toast-text" class="text-xs font-bold uppercase tracking-wider text-zinc-200"></p>
        </div>
    </div>

    <!-- Firebase Real-Time Synchronization Scripts -->
    <script type="module">
        // Import Firebase ES Modules safely
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment variables
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'square-expense-realtime';
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "", // Left blank for local fallback
                authDomain: "square-expense-realtime.firebaseapp.com",
                projectId: "square-expense-realtime",
                storageBucket: "square-expense-realtime.appspot.com",
                messagingSenderId: "1234567890",
                appId: "1:1234:web:abcd"
            };

        // App State parameters
        let isLocalFallback = false;
        let authMode = "login"; // "login" or "register"
        let expenses = [];
        let salary = 75000; // Default Salary
        let workspaceId = ""; // Derived namespace to isolate workspace based on Username/Password hash
        let user = null; // Firebase user
        let selectedMonth = new Date().getMonth(); // Active month selector filter (0-11)

        // Configuration mapping colors to category indices
        const categoryColors = {
            'Food & Dining': { text: 'text-brandGreen', fill: '#55EF9E', bg: 'bg-brandGreen/10', border: 'border-brandGreen' },
            'Transport & Auto': { text: 'text-brandBlue', fill: '#3CC4EC', bg: 'bg-brandBlue/10', border: 'border-brandBlue' },
            'Entertainment': { text: 'text-brandPurple', fill: '#8E8FFA', bg: 'bg-brandPurple/10', border: 'border-brandPurple' },
            'Utilities & Bills': { text: 'text-brandYellow', fill: '#FCD34D', bg: 'bg-brandYellow/10', border: 'border-brandYellow' },
            'Shopping & Custom': { text: 'text-brandPink', fill: '#FF7E82', bg: 'bg-brandPink/10', border: 'border-brandPink' },
            'Miscellaneous': { text: 'text-brandOrange', fill: '#FF9F43', bg: 'bg-brandOrange/10', border: 'border-brandOrange' }
        };

        // Standard Demo Logs setup matching the visuals
        const demoData = [
            { title: "Organic Grocery Store Run", amount: 6200, category: "Food & Dining", date: getOffsetDate(-1) },
            { title: "Uber Cab Charge", amount: 450, category: "Transport & Auto", date: getOffsetDate(-2) },
            { title: "Premium Cinema Ticket", amount: 1200, category: "Entertainment", date: getOffsetDate(-3) },
            { title: "High-Speed WiFi Bill", amount: 1999, category: "Utilities & Bills", date: getOffsetDate(-5) },
            { title: "Mechanical Keyboard", amount: 8500, category: "Shopping & Custom", date: getOffsetDate(-8) },
            { title: "Local Snacks & Chai", amount: 350, category: "Food & Dining", date: getOffsetDate(-10) }
        ];

        // Connection Timeout Trigger
        const connectionTimeout = setTimeout(() => {
            if (!workspaceId) {
                console.warn("Cloud connection timed out. Activating Local Offline Mode.");
                activateOfflineFallback();
            }
        }, 2500);

        function activateOfflineFallback() {
            isLocalFallback = true;
            clearTimeout(connectionTimeout);
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            
            const badge = document.getElementById('db-status-badge');
            badge.textContent = "Offline Secure Mode Active (Local Storage)";
            badge.className = "bg-zinc-800 p-3 rounded-xl border border-zinc-700 text-[11px] font-bold uppercase text-zinc-400 tracking-wider text-center";
            
            document.getElementById('workspace-mode-label').textContent = "LOCAL OFFLINE";

        // Deterministic SHA-256 Workspace key generator
        async function getDeterministicHash(username, password) {
            const msgUint8 = new TextEncoder().encode(username.trim().toLowerCase() + "::" + password.trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 24);
        }

        // polarToCartesian for drawing segments
        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        // Arc path descriptor
        function describeArc(x, y, radius, startAngle, endAngle) {
            const start = polarToCartesian(x, y, radius, endAngle);
            const end = polarToCartesian(x, y, radius, startAngle);
            const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
            return [
                "M", start.x, start.y, 
                "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y
            ].join(" ");
        }

        // Generates clean segmented circular sections on SVG directly
        function drawDoughnutChart(filteredExpenses, totalSpent) {
            const chartSvg = document.getElementById('doughnut-chart-svg');
            const legendList = document.getElementById('chart-legend-list');

            // Reset list and keep basic background circle
            chartSvg.innerHTML = '<circle cx="60" cy="60" r="46" fill="none" stroke="#2C2C2E" stroke-width="12" />';
            legendList.innerHTML = '';

            if (filteredExpenses.length === 0 || totalSpent === 0) {
                legendList.innerHTML = `<div class="col-span-3 text-center py-2 text-zinc-500 text-xs font-semibold lowercase tracking-wide">No transactions recorded.</div>`;
                return;
            }

            // Sum per category
            const categorySums = {};
            Object.keys(categoryColors).forEach(cat => categorySums[cat] = 0);
            filteredExpenses.forEach(item => {
                if (categorySums[item.category] !== undefined) {
                    categorySums[item.category] += item.amount;
                }
            });

            // Calculate percentage segments
            const segments = [];
            Object.entries(categorySums).forEach(([category, sum]) => {
                if (sum > 0) {
                    const percentage = (sum / totalSpent) * 100;
                    segments.push({ category, sum, percentage });
                }
            });

            // Sort largest to smallest for beautiful visual layering
            segments.sort((a, b) => b.sum - a.sum);

            let currentAngle = 0; // Starts from 12 o'clock (via transform rotate-90 inside SVG)
            const gapDegrees = segments.length > 1 ? 6 : 0; // Space gap between segments
            const totalGaps = gapDegrees * segments.length;
            const remainingDegrees = 360 - totalGaps;

            segments.forEach((segment) => {
                const colors = categoryColors[segment.category];
                const sweepAngle = (segment.percentage / 100) * remainingDegrees;
                
                const startAngle = currentAngle + (gapDegrees / 2);
                const endAngle = startAngle + sweepAngle;

                // Create SVG path
                const pathData = describeArc(60, 60, 46, startAngle, endAngle);
                
                const pathNode = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathNode.setAttribute("d", pathData);
                pathNode.setAttribute("fill", "none");
                pathNode.setAttribute("stroke", colors.fill);
                pathNode.setAttribute("stroke-width", "11");
                pathNode.setAttribute("stroke-linecap", "round");
                pathNode.setAttribute("class", "chart-segment cursor-pointer transition-all duration-300 hover:stroke-[13]");
                chartSvg.appendChild(pathNode);

                // Place text precisely inside the segment at midpoint
                const midAngle = startAngle + (sweepAngle / 2);
                const textPos = polarToCartesian(60, 60, 46, midAngle);
                
                // Only render text if the segment sweep is wide enough to hold it gracefully
                if (segment.percentage >= 6) {
                    const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    textNode.setAttribute("x", textPos.x.toString());
                    textNode.setAttribute("y", (textPos.y + 1).toString()); // slight offset for alignment
                    textNode.setAttribute("fill", "#121214");
                    textNode.setAttribute("font-size", "5.5");
                    textNode.setAttribute("font-weight", "800");
                    textNode.setAttribute("text-anchor", "middle");
                    textNode.setAttribute("dominant-baseline", "middle");
                    textNode.textContent = `${Math.round(segment.percentage)}%`;
                    chartSvg.appendChild(textNode);
                }

                currentAngle = endAngle + (gapDegrees / 2);

                // Render matching label entry beneath chart
                const pillHtml = `
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background-color: ${colors.fill}"></span>
                        <span class="truncate block text-zinc-300 text-[10px] lowercase max-w-[80px]">${segment.category.split(' ')[0]}</span>
                        <span class="text-white text-[10px] font-bold">${Math.round(segment.percentage)}%</span>
                    </div>
                `;
                legendList.insertAdjacentHTML('beforeend', pillHtml);
            });
        }

        function showNotification(message, type = "green") {
            const toast = document.getElementById('toast-notification');
            const indicator = document.getElementById('toast-indicator');
            const text = document.getElementById('toast-text');

            text.textContent = message;
            indicator.className = "w-3 h-3 rounded-full";
            if (type === "green") indicator.classList.add("bg-brandGreen");
            if (type === "pink") indicator.classList.add("bg-brandPink");
            if (type === "blue") indicator.classList.add("bg-brandBlue");
            if (type === "yellow") indicator.classList.add("bg-brandYellow");

            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 4000);
        }

        // Custom modal confirmation alerts
        function showConfirm(message, onOk) {
            const modal = document.getElementById('confirm-modal');
            const msgEl = document.getElementById('confirm-message');
            const cancelBtn = document.getElementById('confirm-cancel');
            const okBtn = document.getElementById('confirm-ok');

            msgEl.textContent = message;
            modal.classList.remove('hidden');

            const close = () => modal.classList.add('hidden');
            cancelBtn.onclick = () => { close(); };
            okBtn.onclick = () => { close(); onOk(); };
        }
    </script>
</body>
</html>
